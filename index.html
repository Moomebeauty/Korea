html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:14px}
button,input,select{font-family:inherit;font-size:14px;outline:none}
button{cursor:pointer}
select option{background:#fff;color:#1a1a1a}
.hidden{display:none!important}
.card{background:#fff;border:0.5px solid #e8e8e6;border-radius:14px;padding:14px 16px;margin-bottom:10px}

.lbl{font-size:11px;color:#aaa;margin-bottom:4px;display:block;font-weight:500}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;display:inline-block}
.fab{position:fixed;bottom:76px;right:20px;width:54px;height:54px;border-radius:50%;background:#1D9E75;color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;z-index:150;box-shadow:0 4px 20px rgba(29,158,117,0.4)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding:20px 18px 70px}
.prog-wrap{height:7px;border-radius:4px;background:#ededeb;overflow:hidden;margin:6px 0}
.prog-bar{height:100%;border-radius:4px;transition:width .4s ease}
.rcard{background:#fff;border:0.5px solid #e8e8e6;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.metric{background:#f7f7f5;border-radius:12px;padding:14px}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;border:0.5px solid #e0e0de;background:transparent;color:#888;cursor:pointer}
.pill.active{border-color:#1D9E75;background:#eef8f4;color:#1D9E75;font-weight:600}
.tag{padding:5px 10px;border-radius:20px;font-size:11px;border:0.5px solid #e0e0de;background:transparent;color:#888;cursor:pointer}
.tag.active{font-weight:600}
.section-title{font-size:13px;font-weight:600;margin:14px 0 8px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:#1D9E75;min-height:2px}
.bar-label{font-size:9px;color:#aaa}
.pie-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.pie{width:110px;height:110px;border-radius:50%;flex-shrink:0}
.legend{display:flex;flex-direction:column;gap:5px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e8e8e6;display:flex;z-index:120;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:#aaa;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav-btn.active{color:#1D9E75}
.nav-icon{font-size:18px;line-height:1}
.day-header{background:#F48FB1;border-radius:12px;padding:12px 16px;margin-bottom:10px;color:#fff}
.day-title{font-size:15px;font-weight:700;margin-bottom:2px}
.time-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.time-badge{background:#f0f0ee;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:600;color:#534AB7;min-width:52px;text-align:center;flex-shrink:0;margin-top:1px}
.time-title{font-size:13px;font-weight:600;margin-bottom:2px}
.time-sub{font-size:11px;color:#888;line-height:1.5}
.warn-box{background:#FFF3E0;border-left:3px solid #FFB74D;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#E65100;line-height:1.7}
.info-box{background:#E8F5E9;border-left:3px solid #81C784;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#1B5E20;line-height:1.7}

.user-col-lx{background:#E8F4FD;border:0.5px solid #90CAF9}

.ucol-item{font-size:11px;color:#555;margin-bottom:6px;line-height:1.5}

.spot-name{font-size:13px;font-weight:600;margin-bottom:4px}
.spot-desc{font-size:11px;color:#777;line-height:1.6}

.sub-tabs{display:flex;background:#fff;border:0.5px solid #e8e8e6;border-radius:12px;overflow:hidden;margin-top:12px}

.sub-tab.active{background:#eef8f4;color:#1D9E75;font-weight:600}

<body>
<div id="app">

  <div style="background:#fff;border-bottom:0.5px solid #e8e8e6;padding:11px 16px;position:sticky;top:0;z-index:100">

      <div>
        <div style="font-size:15px;font-weight:700">🇰🇷 首爾旅遊 · 霈潔&amp;珞熙</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px">
          <span class="dot" id="sync-dot" style="background:#F9A825"></span>
          <span id="sync-label">同步中…</span>
          <span id="rate-label" style="margin-left:8px"></span>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        <button class="btn" style="font-size:10px;padding:4px 8px" onclick="syncNow()">↻ 同步</button>
        <div id="user-chips" style="display:flex;gap:4px"></div>
      </div>
    </div>
  </div>
  <div id="sync-banner" class="sync-banner hidden">資料已同步 · 兩人共用同一份資料</div>

  <div style="max-width:680px;margin:0 auto;padding:0 14px;padding-bottom:80px">
    <!-- 行程 tab -->
    <div id="tab-trip"><div style="margin-top:12px"><div class="day-tabs" id="day-tabs"></div><div id="day-content"></div></div></div>

    <!-- 記帳 tab -->
    <div id="tab-expense" class="hidden">
      <div class="sub-tabs">
        <button class="sub-tab active" id="sub-dash-btn" onclick="switchSub('dash')">總覽</button>
        <button class="sub-tab" id="sub-list-btn" onclick="switchSub('list')">收據列表</button>
        <button class="sub-tab" id="sub-chart-btn" onclick="switchSub('chart')">統計</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px;margin-bottom:4px">
        <span style="font-size:11px;color:#aaa">顯示：</span>
        <div id="view-pills" style="display:flex;gap:5px;flex-wrap:wrap"></div>
        <button class="btn" style="margin-left:auto;font-size:11px;padding:4px 10px" onclick="exportXLSX()">📊 匯出</button>
      </div>
      <div id="sub-dash">
        <div class="grid2" style="margin-top:6px">
          <div class="metric"><div style="font-size:11px;color:#aaa;margin-bottom:4px">今日花費</div><div id="today-total" style="font-size:20px;font-weight:700;letter-spacing:-.5px">₩0</div><div id="today-twd" style="font-size:11px;color:#1D9E75;margin-top:2px"></div></div>
          <div class="metric"><div style="font-size:11px;color:#aaa;margin-bottom:4px">旅程累計</div><div id="trip-total" style="font-size:20px;font-weight:700;letter-spacing:-.5px">₩0</div><div id="trip-twd" style="font-size:11px;color:#1D9E75;margin-top:2px"></div></div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-weight:600">預算進度</span><button class="btn" style="font-size:11px;padding:4px 10px" onclick="openBudgetEdit()">設定預算</button></div>
          <div class="prog-wrap"><div id="bud-bar" class="prog-bar" style="width:0%;background:#1D9E75"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px"><span id="bud-pct" style="font-weight:600;color:#1D9E75">已用 0%</span><span id="bud-total" style="color:#aaa">預算 ₩0</span></div>
        </div>
        <div class="card"><div style="font-weight:600;margin-bottom:12px">各人花費</div><div id="user-budgets"></div></div>
        <div class="section-title">最近消費</div>
        <div id="recent-list"></div>
      </div>
      <div id="sub-list" class="hidden">
        <div id="cat-filters" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;margin-bottom:8px"></div>
        <div id="list-meta" style="font-size:11px;color:#aaa;margin-bottom:8px"></div>
        <div id="full-list"></div>
      </div>
      <div id="sub-chart" class="hidden">
        <div class="card" style="margin-top:8px"><div style="font-weight:600;margin-bottom:12px">消費類別</div><div id="cat-pie" class="pie-wrap"></div></div>
        <div class="card"><div style="font-weight:600;margin-bottom:12px">付款方式</div><div id="pay-pie" class="pie-wrap"></div></div>
        <div class="card"><div style="font-weight:600;margin-bottom:10px">每日花費</div><div id="day-bar" class="bar-chart"></div></div>
        <div class="card"><div style="font-weight:600;margin-bottom:12px">類別明細</div><div id="cat-detail"></div></div>
      </div>
    </div>

    <!-- 景點 tab -->
    <div id="tab-spots" class="hidden"><div id="spots-content" style="margin-top:12px"></div></div>

    <!-- 資訊 tab -->
    <div id="tab-info" class="hidden"><div id="info-content" style="margin-top:12px"></div></div>
  </div>

  <button class="fab hidden" id="fab" onclick="openForm(null)">+</button>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-trip" onclick="switchMain('trip')"><span class="nav-icon">📅</span>行程</button>

    <button class="nav-btn" id="nav-info" onclick="switchMain('info')"><span class="nav-icon">ℹ️</span>資訊</button>
  </div>
</div>

<!-- FORM MODAL -->
<div id="form-modal" class="modal-bg hidden">
  <div class="modal-box">
    <div style="width:36px;height:4px;border-radius:2px;background:#e0e0de;margin:0 auto 16px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span id="form-title" style="font-size:16px;font-weight:700">新增收據</span>
      <button style="width:28px;height:28px;border-radius:50%;border:none;background:#f0f0ee;color:#888;font-size:18px;display:flex;align-items:center;justify-content:center" onclick="closeForm()">×</button>
    </div>
    <div id="img-area" style="border:1.5px dashed #d0d0ce;border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;cursor:pointer;background:#fafaf8" onclick="document.getElementById('file-inp').click()">
      <input id="file-inp" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
      <div id="img-content"><div style="font-size:24px;margin-bottom:4px">📷</div><div style="font-size:12px;color:#888;font-weight:500">拍收據照片</div><div style="font-size:10px;color:#1D9E75;margin-top:3px">Claude AI 自動辨識韓文 → 繁體中文</div></div>
    </div>
    <label class="lbl">使用者</label><select id="f-user" class="sel"></select>
    <label class="lbl">日期</label><input id="f-date" type="date" class="inp">
    <label class="lbl">店名</label><input id="f-store" type="text" class="inp" placeholder="例：弘大 Olive Young">
    <label class="lbl">品項</label><input id="f-items" type="text" class="inp" placeholder="例：精華液、面膜">
    <label class="lbl">金額（韓元 KRW）</label>
    <input id="f-amount" type="number" class="inp" placeholder="例：35000" oninput="updateTWD()">
    <div id="f-twd" style="font-size:11px;color:#1D9E75;margin-top:-8px;margin-bottom:10px;display:none"></div>
    <label class="lbl">類別</label><div id="f-cats" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <label class="lbl">付款方式</label><div id="f-pays" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <label class="lbl">備註（選填）</label><input id="f-note" type="text" class="inp" placeholder="選填">
    <button class="btn-green" style="width:100%;padding:13px;border-radius:12px;font-size:15px;margin-top:4px" onclick="saveForm()"><span id="save-btn-label">新增收據</span></button>
  </div>
</div>

<!-- BUDGET MODAL -->
<div id="bud-modal" class="modal-bg hidden">
  <div class="modal-box" style="padding-bottom:40px">
    <div style="width:36px;height:4px;border-radius:2px;background:#e0e0de;margin:0 auto 16px"></div>
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">設定預算</div>
    <div id="bud-inputs"></div>
    <button class="btn-green" style="width:100%;padding:13px;border-radius:12px;font-size:15px;margin-top:8px" onclick="saveBudgets()">儲存</button>
    <button class="btn" style="width:100%;padding:10px;border-radius:12px;font-size:13px;margin-top:8px" onclick="closeBudget()">取消</button>
  </div>
</div>

/* ═══════ PERSISTENT STORAGE ═══════ */
async function loadFromCloud(){
  try{
    const res=await window.storage.get(STORAGE_KEY,true);
    if(res&&res.value){
      const d=JSON.parse(res.value);
      STATE=d;
      setSyncUI("ok");
    }else{
      setSyncUI("ok");
    }
  }catch(e){
    // 若沒有雲端存取，用 localStorage
    try{
      const local=localStorage.getItem(STORAGE_KEY);
      if(local) STATE=JSON.parse(local);
    }catch{}
    setSyncUI("local");
  }
  renderExpense();
}

async function saveToCloud(){
  setSyncUI("syncing");
  const payload=JSON.stringify({...STATE,updatedAt:new Date().toISOString()});
  try{
    await window.storage.set(STORAGE_KEY,payload,true);
    localStorage.setItem(STORAGE_KEY,payload);
    STATE={...STATE,updatedAt:new Date().toISOString()};
    setSyncUI("ok");
  }catch{
    // fallback to localStorage only
    localStorage.setItem(STORAGE_KEY,payload);
    setSyncUI("local");
  }
  renderExpense();
}

async function syncNow(){
  setSyncUI("syncing");
  await loadFromCloud();
}

function setSyncUI(s){
  const map={
    syncing:["#F9A825","同步中…"],
    ok:["#1D9E75","✓ 已同步"],
    local:["#378ADD","本機儲存"],
    err:["#E24B4A","同步失敗"],
  };
  const[c,t]=map[s]||map.ok;
  $("sync-dot").style.background=c;
  $("sync-label").textContent=t;
  const banner=$("sync-banner");
  if(s==="ok"){banner.classList.remove("hidden");setTimeout(()=>banner.classList.add("hidden"),2000);}
}

function renderPie(id,data,total){
  if(!data.length){$(id).innerHTML=`<div style="color:#ccc;font-size:12px;padding:20px">尚無資料</div>`;return;}
  let deg=0;
  const stops=data.map(d=>{const pct=total>0?d.value/total*100:0,s=`${d.color} ${deg}% ${deg+pct}%`;deg+=pct;return s;});
  $(id).innerHTML=`<div class="pie" style="background:conic-gradient(${stops.join(",")})"></div><div class="legend">${data.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span>${d.name}</span><span style="color:#aaa;margin-left:4px">${total>0?Math.round(d.value/total*100):0}%</span></div>`).join("")}</div>`;
}

}

function setActiveUser(u){activeUser=u;viewUser=u;renderExpense();}
function setViewUser(u){viewUser=u;renderExpense();}
function setCatFilter(c){catFilter=c;renderList();}
function delR(id,key){
  if(!confirm("確定刪除？"))return;
  STATE.receipts[key]=(STATE.receipts[key]||[]).filter(r=>String(r.id)!==String(id));
  saveToCloud();
}

/* ═══════ FORM ═══════ */
function openForm(id){
  editId=id;$("form-title").textContent=id?"編輯收據":"新增收據";$("save-btn-label").textContent=id?"儲存修改":"新增收據";
  const r=id?allR().find(x=>String(x.id)===String(id)):null;
  $("f-user").innerHTML=USERS.map(u=>`<option ${r&&r.user===u?"selected":""}>${u}</option>`).join("");
  $("f-date").value=r?r.date:today();$("f-store").value=r?r.store:"";$("f-items").value=r?r.items:"";$("f-amount").value=r?r.amount:"";$("f-note").value=r?r.note:"";
  formCat=r?r.category:"購物";formPay=r?r.payMethod:"現金";
  renderFTags();updateTWD();
  $("img-content").innerHTML=`<div style="font-size:24px;margin-bottom:4px">📷</div><div style="font-size:12px;color:#888;font-weight:500">拍收據照片</div><div style="font-size:10px;color:#1D9E75;margin-top:3px">Claude AI 自動辨識韓文 → 繁體中文</div>`;
  $("file-inp").value="";$("form-modal").classList.remove("hidden");document.body.style.overflow="hidden";
}
function closeForm(){$("form-modal").classList.add("hidden");document.body.style.overflow="";editId=null;}
function renderFTags(){
  $("f-cats").innerHTML=CATS.map(c=>{const a=formCat===c,clr=CAT_CLR[c];return`<button class="tag ${a?"active":""}" onclick="setFC('${c}')" style="${a&&clr?`border-color:${clr};background:${clr}18;color:${clr}`:""}">${c}</button>`;}).join("");
  $("f-pays").innerHTML=PAYS.map(p=>{const a=formPay===p;return`<button class="tag ${a?"active":""}" onclick="setFP('${p}')" style="${a?"border-color:#534AB7;background:#534AB718;color:#534AB7":""}">${p}</button>`;}).join("");
}
function setFC(c){formCat=c;renderFTags();}
function setFP(p){formPay=p;renderFTags();}
function updateTWD(){const v=$("f-amount").value,el=$("f-twd");if(rate&&v){el.style.display="block";el.textContent="≈ "+twd(v);}else el.style.display="none";}
async function handleImg(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const b64=ev.target.result.split(",")[1];
    $("img-content").innerHTML=`<div style="font-size:13px;color:#1D9E75;font-weight:500">🔍 AI 辨識中…</div>`;
    try{
      const p=await scanReceipt(b64);
      if(p.store)$("f-store").value=p.store;if(p.items)$("f-items").value=p.items;
      if(p.amount)$("f-amount").value=p.amount;if(p.category&&CATS.includes(p.category))formCat=p.category;
      if(p.note)$("f-note").value=p.note;
      renderFTags();updateTWD();
      $("img-content").innerHTML=`<div style="font-size:12px;color:#1D9E75;font-weight:600">✓ 辨識完成！</div><div style="font-size:10px;color:#aaa;margin-top:4px">點此重新拍照</div>`;
    }catch{$("img-content").innerHTML=`<div style="font-size:12px;color:#E24B4A">辨識失敗，請手動填寫</div>`;}
  };
  reader.readAsDataURL(file);
}
function saveForm(){
  const amount=$("f-amount").value;if(!amount){alert("請填寫金額");return;}
  const user=$("f-user").value,key=UKEY[user]||"pj";
  const receipt={id:editId||uid(),user,date:$("f-date").value,store:$("f-store").value,items:$("f-items").value,amount,category:formCat,payMethod:formPay,note:$("f-note").value};
  if(editId){let f=false;["pj","lx","co"].forEach(k=>{const i=(STATE.receipts[k]||[]).findIndex(r=>String(r.id)===String(editId));if(i>=0){STATE.receipts[k][i]=receipt;f=true;}});if(!f)STATE.receipts[key].unshift(receipt);}
  else{if(!STATE.receipts[key])STATE.receipts[key]=[];STATE.receipts[key].unshift(receipt);}
  closeForm();saveToCloud();
}

/* ═══════ BUDGET ═══════ */
function openBudgetEdit(){
  $("bud-inputs").innerHTML=USERS.map(u=>`<label class="lbl">${u} 預算（韓元）</label><input id="bud-${UKEY[u]}" type="number" class="inp" value="${STATE.budgets[UKEY[u]]||BDEF}">`).join("");
  $("bud-modal").classList.remove("hidden");document.body.style.overflow="hidden";
}
function closeBudget(){$("bud-modal").classList.add("hidden");document.body.style.overflow="";}
function saveBudgets(){
  USERS.forEach(u=>{const v=Number($("bud-"+UKEY[u]).value);if(v>0)STATE.budgets[UKEY[u]]=v;});
  closeBudget();saveToCloud();
}

$("form-modal").addEventListener("click",e=>{if(e.target===$("form-modal"))closeForm();});
$("bud-modal").addEventListener("click",e=>{if(e.target===$("bud-modal"))closeBudget();});

/* ═══════ BOOT ═══════ */
async function boot(){
  renderTrip();
  await Promise.all([fetchRate(),loadFromCloud()]);
  renderExpense();
  setInterval(()=>loadFromCloud(),45000);
}
boot();
</script>
